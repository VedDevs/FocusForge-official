<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght=400;600;700;800&family=JetBrains+Mono:wght=400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="scanline"></div>
<div class="noise"></div>

<header class="topbar">
  <div class="logo">
    <span class="logo-icon">⚡</span>
    <span class="logo-text">FocusForge</span>
  </div>
  <nav class="nav">
    <button class="nav-btn active" data-page="dashboard">Dashboard</button>
    <button class="nav-btn" data-page="store">Store</button>
    <button class="nav-btn" data-page="leaderboard">Board</button>
    <button class="nav-btn" data-page="history">History</button>
  </nav>
</header>

<main class="main">

  <section class="page active" id="page-dashboard">
    <div class="section-title">
      <span class="tag">LIVE</span>
      <h2>Point Dashboard</h2>
    </div>
    <div class="cards-grid" id="dashboard-cards-grid">
      <div class="loading-ph">Loading user cards...</div>
    </div>
    <div class="live-feed">
      <div class="feed-header">
        <span class="pulse"></span> Live Activity
      </div>
      <div class="feed-list" id="live-feed-list">
        <div class="feed-empty">No activity yet...</div>
      </div>
    </div>
  </section>

  <section class="page" id="page-store">
    <div class="section-title">
      <span class="tag">STORE</span>
      <h2>Reward Store</h2>
    </div>
    <div class="user-select-bar">
      <span>Redeeming as:</span>
      <div id="user-select-buttons" style="display: inline-flex; gap: .5rem;"></div>
      <span class="balance-label">Balance: <strong id="store-balance">—</strong> pts</span>
    </div>
    <div class="rewards-grid" id="rewards-grid">
      <div class="loading-ph">Loading rewards...</div>
    </div>
    <div class="toast" id="toast"></div>
  </section>

  <section class="page" id="page-leaderboard">
    <div class="section-title">
      <span class="tag">RANK</span>
      <h2>Leaderboard</h2>
    </div>
    <div class="lb-container" id="lb-container">
      <div class="loading-ph">Loading...</div>
    </div>
  </section>

  <section class="page" id="page-history">
    <div class="section-title">
      <span class="tag">LOG</span>
      <h2>Transaction History</h2>
    </div>
    <div class="history-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="earn">Earned</button>
      <button class="filter-btn" data-filter="spend">Spent</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="loading-ph">Loading...</div>
    </div>
  </section>

</main>

<script type="module" src="script.js"></script>
</body>
</html>
